services:
  - type: web
    name: family-finance-bot-v2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: YANDEX_TOKEN
        sync: false
      - key: PUBLIC_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: RENDER_URL
        value: https://family-finance-bot-c2b7.onrender.com  # ВАШ РЕАЛЬНЫЙ URL!
    healthCheckPath: /health
    autoDeploy: true
